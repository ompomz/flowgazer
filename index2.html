<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flowgazer -kindness edition-</title>
    <link rel="icon" type="image/x-icon" href="https://ompomz.github.io/flowgazer/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-weight: 400;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
            padding: .5rem;
            line-height: 1.3;
            background-color: #f7f7f7;
            color: #666;
            font-size: .9rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto 0 .5rem;
            padding: .5rem;
        }

        a {
            color: #666;
            text-decoration: none;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: .5rem;
        }

        /* フォーム要素 */
        input,
        textarea,
        select {
            font-size: .9rem;
            font-family: inherit;
            color: #666;
            background-color: #fff;
            transition: background-color 0.3s, color 0.3s;
            padding: .5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            vertical-align: middle;
        }

        textarea {
            resize: vertical;
        }

        /* ボタン */
        .container button {
            background-color: #ddd;
            font-size: .8rem;
            font-weight: 700;
            text-align: center;
            color: #fff;
            white-space: nowrap;
            padding: 0.25rem 0.75rem;
            margin: 0;
            min-width: 4rem;
            min-height: 1.75rem;
            border: none;
            border-radius: 999px;
            cursor: pointer;
        }

        .full-width {
            width: 100%;
        }

        .flex-container {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin: 0;
        }

        .flex-container button,
        .flex-container input,
        .flex-container textarea,
        .flex-container select {
            flex-grow: 1;
            margin: 0.25rem 0;
        }

        .flex-column {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .flex-wrap {
            flex-wrap: wrap;
        }

        .flex-exbetween {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .setting-tabs-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin: 0.5rem 0 0 0;
            column-gap: 0.25rem;
            row-gap: 0.5rem;
        }

        /* チェックボックス */
        .settings-checkbox-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.25rem;
            margin: 0;
        }

        .settings-checkbox-row input {
            flex-grow: 0 !important;
            width: auto;
            margin: 0;
        }

        .settings-checkbox-row label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            white-space: nowrap;
            margin-left: 0.5rem;
            font-size: 0.85rem;
        }

        .settings-checkbox-row .no-margin-left {
            margin-left: 0.25rem !important;
        }

        /* 特定入力 */
        #kind-7-content-input {
            width: 2.2rem;
            height: 1.5rem;
            text-align: center;
            padding: 0;
        }

        #show-settings,
        #hide-settings {
            background-color: hsl(0, 0%, 60%);
            margin: 0;
        }

        /* タブ */
        #tab-buttons {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        #tab-buttons button {
            margin: 0;
        }

        .tab-button.active {
            background: #66b3ff;
        }

        /* タイムライン */
        ul {
            list-style: none;
            padding: 0;
            margin: 0.5rem 0;
        }

        li.event {
            word-break: break-all;
            padding: .5rem .25rem;
            border-top: 1px dashed #ddd;
        }

        .event-liked {
            border-right: .3rem solid gold;
        }

        .npub-link,
        .nostr-ref,
        .pubkey-ref {
            color: #66b3ff;
        }

        .custom-emoji {
            height: 1.2rem;
            vertical-align: bottom;
        }

        .post-content {
            display: inline;
        }

        /* 表示制御 */
        .hidden,
        .hidden-section {
            display: none;
        }

        /* ボタン系 */
        #generate-trial-keypair-original {
            background-color: #f9c;
        }

        #send-new-post {
            background-color: #ffcc66;
            margin: 0;
        }

        #subscribe-relay,
        #apply-filter,
        #clear-filter {
            background-color: #ffcc66;
            text-align: center;
            padding: 4px 0;
            max-width: 4rem;
            width: 4rem;
        }

        /* ローディング */
        #load-more {
            background: #66b3ff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        #load-more.loading::before {
            content: "";
            width: 0.9rem;
            height: 0.9rem;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='3' stroke-linecap='round'><path d='M12 2a10 10 0 1 1-10 10' /></svg>");
            background-size: contain;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* チュートリアル */
        #open-tutorial-btn {
            font-size: 1rem;
            color: #00796b;
            background-color: #e0f2f1;
            padding: 0.25rem 2rem;
            margin: 0 0 0.5rem 0;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            transition: background-color 0.2s;
        }

        #open-tutorial-btn:hover {
            background-color: #b2dfdb;
        }

        #tutorial-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            background-color: rgba(247, 247, 247, .5);
            display: none;
            backdrop-filter: blur(5px);
            transition: all 0.5s ease-in-out;
        }

        #tutorial-modal {
            background-color: rgba(255, 255, 255, .8);
            padding: 1.2rem 1.2rem .5rem 1.2rem;
            border-radius: .6rem;
            max-width: 600px;
            width: 80%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .2);
            position: relative;
        }

        #image-container {
            text-align: center;
            margin-bottom: .5rem;
        }

        .tutorial-image {
            display: none;
            max-width: 100%;
        }

        .tutorial-image.active {
            display: block;
        }

        #tutorial-navigation {
            display: flex;
            justify-content: space-between;
            margin-top: .5rem;
        }

        #prev-button,
        #next-button {
            width: 2rem;
            height: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            color: #e0f2f1;
            background-color: rgba(0, 121, 107, .7);
            border: none;
            border-radius: 50%;
            cursor: pointer;
        }

        #tutorial-close-button {
            position: absolute;
            top: .5rem;
            right: .5rem;
            font-size: .9rem;
            font-weight: 700;
            color: #e0f2f1;
            background-color: #00796b;
            padding: .25rem .5rem;
            border-radius: 999px;
            cursor: pointer;
            border: none;
        }

        .dot-navigation {
            text-align: center;
        }

        .dot {
            height: 1rem;
            width: 1rem;
            background-color: #e0f2f1;
            border-radius: 50%;
            display: inline-block;
            margin: 0 5px;
            cursor: pointer;
        }

        .dot.active {
            background-color: #00796b;
        }

        /* フッター */
        .viewongithub {
            margin-top: 0.5rem;
            text-align: center;
            padding-bottom: 3rem;
        }

        .viewongithub a {
            color: #66b3ff !important;
        }

        /* レスポンシブ */
        @media (max-width: 767px) {
            .container {
                max-width: 100%;
                padding: 4px;
                margin: 0;
            }
        }

        @media (max-width: 400px) {
            .flex-container button,
            .flex-exbetween button {
                font-size: 0.6rem !important;
            }
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>
    <div class="container">
        <div class="flex-exbetween">
            <a href="https://ompomz.github.io/flowgazer/index2.html">
                <h1>flowgazer -kindness edition-</h1>
            </a>
            <button id="open-tutorial-btn">🔰チュートリアルをひらく</button>
        </div>

        <p>Nostrを「体験」してみてほしい！<br>このページでは、タイムラインを見たり、鍵ペアを作って投稿したり、ふぁぼったりすることができるよ。</p>

        <div class="flex-container">
            <button id="generate-trial-keypair-original"
                onclick="generateAndLoginWithNewKeypair()">新しい鍵ペアを生成して試す！</button>
            <button class="btn-grow" onclick="showAuthUI()">すでに鍵をお持ちの方</button>
        </div>

        <div class="flex-container">
            <a id="npub-link" class="npub-link" target="_blank" style="display: none;"></a>
            <span id="not-logged-in">見るだけモード</span>

        </div>

        <div style="margin-top: 0.25rem;">
            <textarea id="new-post-content" rows="3" placeholder="いまなにしてる？" class="full-width"></textarea>
            <button id="send-new-post" class="full-width">投稿</button>
        </div>

        <div class="setting-tabs-row">
            <button id="show-settings">詳細設定を表示</button>
            <button id="hide-settings" class="hidden">詳細設定を隠す</button>

            <div id="advanced-settings" style="width: 100%; margin:-0.25rem 0;" class="hidden">
                <div class="flex-container">
                    <input id="relay-url" type="text" list="relay-suggestions" placeholder="wss://...">
                    <datalist id="relay-suggestions">
                        <option value="wss://r.kojira.io/">
                        <option value="wss://yabu.me/">
                        <option value="wss://nostr.compile-error.net/">
                        <option value="wss://relay-jp.nostr.wirednet.jp/">
                        <option value="wss://relay.damus.io/">
                        <option value="wss://nos.lol/">
                        <option value="wss://relay.nostr.band/">
                    </datalist>
                    <button id="subscribe-relay">接続</button>
                </div>

                <div class="hidden-section flex-container flex-wrap">
                    <select id="post-kind-selector" style="flex-grow: 0;">
                        <option value="1">投稿モード：通常</option>
                        <option value="42">投稿モード：チャンネル</option>
                    </select>
                    <select id="channel-list-selector" class="hidden">
                        <option value="">-- チャンネルを選択 --</option>
                    </select>
                    <label for="toggle-kind42">チャンネル投稿</label>
                    <input type="checkbox" id="toggle-kind42">
                </div>

                <div class="settings-checkbox-row flex-wrap">
                    <label for="auto-update-toggle" class="no-margin-left">自動更新</label>
                    <input type="checkbox" id="auto-update-toggle" checked>

                    <label for="filter-flowgazer-only">flowgazer しぼりこみ</label>
                    <input type="checkbox" id="filter-flowgazer-only">

                    <label for="kind-7-content-input">ふぁぼマーク</label>
                    <input id="kind-7-content-input" type="text" maxlength="10" value="⭐">
                </div>

                <div class="flex-container">
                    <textarea id="hex-filter" rows="3" placeholder="投稿者しぼりこみ(npub1…,hex…)"></textarea>
                    <div class="flex-column">
                        <button id="apply-filter">適用</button>
                        <button id="clear-filter">クリア</button>
                    </div>
                </div>

            </div>

            <div id="tab-buttons">
                <button id="tab-global" class="tab-button active">みんな</button>
                <button id="tab-following" class="tab-button">フォロー</button>
                <button id="tab-channel" class="tab-button hidden">チャンネル</button>
                <button id="tab-myposts" class="tab-button">自分</button>
                <button id="tab-likes" class="tab-button">ふぁぼられ</button>
            </div>
        </div>

        <ul id="timeline"></ul>
        <button id="load-more" class="full-width">もっと見る</button>

        <p class="viewongithub"><a href="https://ompomz.github.io/flowgazer/">normal edition</a></p>
    </div>

    <!-- 
    Based on motherfucking-nostr-client by かすてらふぃ（jiftechnify）
    Some parts generated or modified with AI assistance  
    Uses nostr-tools (MIT License)
    Licensed under WTFPL
    -->

    <script src="https://ompomz.github.io/tweetsrecap/utility.js"></script>
    <script src="https://ompomz.github.io/header/loadHeader.js"></script>
    <script src="https://ompomz.github.io/flowgazer/tutorial.js"></script>
    <script src="https://unpkg.com/nostr-tools@2.17.0/lib/nostr.bundle.js"></script>

    <script src="./auth.js"></script>
    <script src="./auth-ui.js"></script>
    <script src="./relay-manager.js"></script>
    <script src="./data-store.js"></script>
    <script src="./view-state.js"></script>
    <script src="./profile-fetcher.js"></script>
    <script src="./timeline.js"></script>
    <script src="./app.js"></script>

    <script>
        /**
         * インデックス側での橋渡し
         */
        function generateAndLoginWithNewKeypair() {
            if (typeof authEventHandlers !== 'undefined') {
                authEventHandlers.generateTrial();
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // グローバルな channelNameMap の初期化（app.jsで使っている場合）
            window.channelNameMap = new Map();

            // Timelineの初期化
            window.timeline = new Timeline(document.getElementById('timeline'));

            // app.js のインスタンス化（クラス形式の場合）
            if (typeof App === 'function' && !window.app) {
                window.app = new App();
            }

            // 初期化実行
            await window.app.init();

            // ログイン状態を初回反映
            if (window.app.updateLoginUI) {
                window.app.updateLoginUI();
            }

            // チャンネルリストの取得（ログイン時のみ）
            if (window.nostrAuth.isLoggedIn()) {
                fetchMyChannels();
            }
        });
    </script>

    <div id="tutorial-overlay">
        <div id="tutorial-modal">
            <div id="tutorial-close-button">とじる</div>
            <div id="tutorial-content">
                <div id="image-container">
                    <img src="https://ompomz.github.io/flowgazer/image1.png" class="tutorial-image active">
                    <img src="https://ompomz.github.io/flowgazer/image2.png" class="tutorial-image">
                    <img src="https://ompomz.github.io/flowgazer/image3.png" class="tutorial-image">
                </div>
                <div id="dot-navigation" class="dot-navigation">
                    <span class="dot active" data-index="0"></span>
                    <span class="dot" data-index="1"></span>
                    <span class="dot" data-index="2"></span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
