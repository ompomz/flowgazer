<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flowgazer</title>
    <link rel="icon" type="image/x-icon" href="https://ompomz.github.io/flowgazer/favicon.ico">
    <style>
        /* ベーススタイル */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-weight: 400;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
            padding: .5rem;
            line-height: 1.3;
            background-color: #f7f7f7;
            color: #666;
            font-size: .9rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto 0 .5rem;
            padding: .5rem;
        }

        a {
            color: #666;
            text-decoration: none;
        }

        h1 {
            font-size: 1.1rem;
        }

        /* フォーム要素の共通設定 */
        input,
        textarea,
        select {
            font-size: .9rem;
            font-family: inherit;
            color: #666;
            background-color: #fff;
            transition: background-color 0.3s, color 0.3s;
            padding: .5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            vertical-align: middle;
            cursor: pointer;
        }

        textarea {
            resize: vertical;
        }

        /* ボタン共通 */
        .container button {
            background-color: #ddd;
            font-size: .8rem;
            font-weight: 700;
            text-align: center;
            color: #fff;
            white-space: nowrap;
            padding: 0.25rem 0.75rem;
            margin: 0;
            min-width: 4rem;
            min-height: 1.75rem;
            border: none;
            border-radius: 999px;
            cursor: pointer;
        }

        .full-width {
            width: 100%;
        }

        /* レイアウト用共通クラス */
        .flex-container {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin: 0;
        }

        .flex-container button,
        .flex-container input,
        .flex-container textarea,
        .flex-container select {
            flex-grow: 1;
            margin: 0.25rem 0;
        }

        .flex-column {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .flex-column button {
            margin: 0;
        }

        .flex-wrap {
            flex-wrap: wrap;
        }

        .flex-exbetween {
            display: flex;
            justify-content: left;
            gap: 1rem;
            align-items: baseline;
            margin-bottom: 0.25rem;
        }

        /* チェックボックス行専用のスタイル */
        .settings-checkbox-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.25rem;
            margin: 0;
        }

        .settings-checkbox-row input {
            flex-grow: 0 !important;
            width: auto;
            margin: 0;
        }

        .settings-checkbox-row label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            white-space: nowrap;
            margin-left: 0.5rem;
            font-size: 0.85rem;
        }

        .settings-checkbox-row .no-margin-left {
            margin-left: 0.25rem !important;
        }

        /* 特定入力欄 */
        #kind-7-content-input {
            width: 2.2rem;
            height: 1.5rem;
            text-align: center;
            padding: 0;
        }

        /* ehagaki モーダル関連 (優先設定) */
        /* ボタン: open-ehagaki-modal */
        #open-ehagaki-modal {
            position: fixed;
            top: 0.5rem;
            right: 0.5rem;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background-color: hsla(150, 70%, 70%, 0.3);
            background-image: url('https://raw.githubusercontent.com/Lokuyow/ehagaki/main/public/ehagaki_icon.svg');
            background-size: 60%;
            background-repeat: no-repeat;
            background-position: center;
            border: none;
            cursor: pointer;
            z-index: 999;
            transition: transform 0.2s;
        }

        #open-ehagaki-modal:hover {
            transform: scale(1.1);
        }

        /* モーダル外枠 */
        #ehagaki-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        /* モーダルコンテンツ */
        #ehagaki-modal>div {
            position: relative;
            width: 95%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        /* 閉じるボタン */
        #close-ehagaki-modal {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            font-weight: bold;
            color: #fff;
            background: hsl(152, 74%, 43%, 0.5);
            border: none;
            border-radius: 999px;
            padding: 6px 18px;
            cursor: pointer;
        }

        /* iframe */
        #ehagaki-iframe {
            width: 100%;
            height: 100%;
        }

        /* タイムライン・表示制御 */
        ul {
            list-style: none;
            padding: 0;
            margin: 0.5rem 0;
        }

        li.event {
            word-break: break-all;
            padding: .5rem .25rem;
            border-top: 1px dashed #ddd;
        }

        .event-liked {
            border-right: .3rem solid gold;
        }

        .npub-link,
        .nostr-ref,
        .pubkey-ref {
            color: #66b3ff;
            text-decoration: none;
        }

        .custom-emoji {
            height: 1.2rem;
            vertical-align: bottom;
        }

        .post-content {
            display: inline;
        }

        .hidden-section,
        .hidden {
            display: none;
        }

        /* タブまわりなど */
        .setting-tabs-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin: 0.5rem 0 0 0;
            column-gap: 0.25rem;
            row-gap: 0.5rem;
        }

        #show-settings,
        #hide-settings {
            background-color: hsl(0, 0%, 60%);
            margin: 0;
        }

        #tab-buttons {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        #tab-buttons button {
            margin: 0;
        }

        .tab-button.active {
            background: #66b3ff;
        }

        #load-more {
            background: #66b3ff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* 各種カラーバリエーション */
        #generate-trial-keypair-original {
            background-color: #f9c;
        }

        #send-new-post {
            background-color: #ffcc66;
            margin: 0;
        }

        #subscribe-relay,
        #apply-filter,
        #clear-filter {
            background-color: #ffcc66;
            text-align: center;
            padding: 4px 0;
            max-width: 4rem;
            width: 4rem;
        }

        /* アニメーション */
        #load-more.loading::before {
            content: "";
            width: 0.9rem;
            height: 0.9rem;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='3' stroke-linecap='round'><path d='M12 2a10 10 0 1 1-10 10' /></svg>");
            background-size: contain;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* フッター・レスポンシブ */
        .viewongithub {
            margin-top: 0.5rem;
            text-align: center;
            padding-bottom: 3rem;
        }

        .viewongithub a {
            color: #66b3ff !important;
        }

        @media (max-width: 767px) {
            .container {
                max-width: 100%;
                padding: 4px;
                margin: 0;
            }
        }

        @media (max-width: 400px) {
            .flex-container button {
                font-size: 0.6rem !important;
            }
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>

    <div class="container">
        <div class="flex-exbetween">
            <a href="https://ompomz.github.io/flowgazer/">
                <h1>flowgazer</h1>
            </a>
            <p style="font-size: 0.8rem;">タイムラインを見たり、投稿したり、ふぁぼったりできるよ。</p>
        </div>

        <div class="flex-container">
            <button id="generate-trial-keypair-original"
                onclick="generateAndLoginWithNewKeypair()">新しい鍵ペアを生成して試す！</button>
            <button class="btn-grow" onclick="showAuthUI()">すでに鍵をお持ちの方</button>
        </div>

        <div class="flex-container">
            <a id="npub-link" class="npub-link" target="_blank" style="display: none;"></a>
            <span id="not-logged-in">見るだけモード</span>

        </div>

        <div style="margin-top: 0.25rem;">
            <textarea id="new-post-content" rows="3" placeholder="いまなにしてる？" class="full-width"></textarea>
            <button id="send-new-post" class="full-width">投稿</button>
        </div>

        <div class="setting-tabs-row">
            <button id="show-settings">詳細設定を表示</button>
            <button id="hide-settings" class="hidden">詳細設定を隠す</button>

            <div id="advanced-settings" style="width: 100%; margin:-0.25rem 0;" class="hidden">
                <div class="flex-container">
                    <input id="relay-url" type="text" list="relay-suggestions" placeholder="wss://...">
                    <datalist id="relay-suggestions">
                        <option value="wss://r.kojira.io/">
                        <option value="wss://yabu.me/">
                        <option value="wss://nostr.compile-error.net/">
                        <option value="wss://relay-jp.nostr.wirednet.jp/">
                        <option value="wss://relay.damus.io/">
                        <option value="wss://nos.lol/">
                        <option value="wss://relay.nostr.band/">
                    </datalist>
                    <button id="subscribe-relay">接続</button>
                </div>

                <div class="flex-container flex-wrap">
                    <select id="post-kind-selector" style="flex-grow: 0;">
                        <option value="1">投稿モード：通常</option>
                        <option value="42">投稿モード：チャンネル</option>
                    </select>
                    <select id="channel-list-selector" class="hidden">
                        <option value="">-- チャンネルを選択 --</option>
                    </select>
                </div>

                <div class="settings-checkbox-row flex-wrap">
                    <label for="auto-update-toggle" class="no-margin-left">自動更新</label>
                    <input type="checkbox" id="auto-update-toggle" checked>

                    <label for="filter-flowgazer-only">flowgazer しぼりこみ</label>
                    <input type="checkbox" id="filter-flowgazer-only">

                    <label for="toggle-kind42">チャンネル投稿</label>
                    <input type="checkbox" id="toggle-kind42">

                    <label for="kind-7-content-input">ふぁぼマーク</label>
                    <input id="kind-7-content-input" type="text" maxlength="10" value="⭐">
                </div>

                <div class="flex-container">
                    <textarea id="hex-filter" rows="3" placeholder="投稿者しぼりこみ(npub1…,hex…)"></textarea>
                    <div class="flex-column">
                        <button id="apply-filter">適用</button>
                        <button id="clear-filter">クリア</button>
                    </div>
                </div>

            </div>

            <div id="tab-buttons">
                <button id="tab-global" class="tab-button active">みんな</button>
                <button id="tab-following" class="tab-button">フォロー</button>
                <button id="tab-channel" class="tab-button hidden">チャンネル</button>
                <button id="tab-myposts" class="tab-button">自分</button>
                <button id="tab-likes" class="tab-button">ふぁぼられ</button>
            </div>
        </div>

        <ul id="timeline"></ul>
        <button id="load-more" class="full-width">もっと見る</button>

        <p class="viewongithub"><a href="https://github.com/ompomz/flowgazer">view on github</a></p>
    </div>

    <!-- 
    Based on motherfucking-nostr-client by かすてらふぃ（jiftechnify）
    Some parts generated or modified with AI assistance

    Licensed under WTFPL

    <script src="https://ompomz.github.io/tweetsrecap/utility.js"></script>
    <script src="https://ompomz.github.io/header/loadHeader.js"></script>
    <script src="https://unpkg.com/nostr-tools@2.17.0/lib/nostr.bundle.js"></script>

    <script src="./auth.js"></script>
    <script src="./auth-ui.js"></script>
    <script src="./relay-manager.js"></script>
    <script src="./data-store.js"></script>
    <script src="./view-state.js"></script>
    <script src="./profile-fetcher.js"></script>
    <script src="./timeline.js"></script>
    <script src="./app.js"></script>

    <script>
        /**
         * インデックス側での橋渡し
         */
        function generateAndLoginWithNewKeypair() {
            if (typeof authEventHandlers !== 'undefined') {
                authEventHandlers.generateTrial();
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // グローバルな channelNameMap の初期化（app.jsで使っている場合）
            window.channelNameMap = new Map();

            // Timelineの初期化
            window.timeline = new Timeline(document.getElementById('timeline'));

            // app.js のインスタンス化（クラス形式の場合）
            if (typeof App === 'function' && !window.app) {
                window.app = new App();
            }

            // 初期化実行
            await window.app.init();

            // ログイン状態を初回反映
            if (window.app.updateLoginUI) {
                window.app.updateLoginUI();
            }

            // チャンネルリストの取得（ログイン時のみ）
            if (window.nostrAuth.isLoggedIn()) {
                fetchMyChannels();
            }
        });
    </script>
</body>

</html>
