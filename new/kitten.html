<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flowgazer</title>
    <link rel="icon" type="image/x-icon" href="https://ompomz.github.io/flowgazer/favicon.ico">
    <link rel="stylesheet" href="https://ompomz.github.io/flowgazer/style.css">
</head>

<body>
    <button id="open-ehagaki-modal" style="
    position: fixed; 
    top:0.5rem;
    right: 0.5rem; 
    width: 3.5rem; 
    height: 3.5rem; 
    border-radius: 50%; 
    background-color: hsl(150, 70%, 70%, 0.3);
    background-image: url('https://raw.githubusercontent.com/Lokuyow/ehagaki/main/public/ehagaki_icon.svg');
    background-size: 60%;
    background-repeat: no-repeat;
    background-position: center;
    border: none;
    cursor: pointer;
    z-index: 999;
    transition: transform 0.2s;
" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1.0)'">
    </button>

    <div id="ehagaki-modal"
        style=" display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; ">
        <div
            style=" position: relative; width: 95%; max-width: 600px; height: 80vh; background: white; border-radius: 12px; overflow: hidden; ">
            <button id="close-ehagaki-modal"
                style=" position: absolute; top: 10px; right: 10px; z-index: 1001; background: #eee; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; ">✕
                閉じる</button> <iframe id="ehagaki-iframe" src="https://lokuyow.github.io/ehagaki/" width="100%"
                height="100%" frameborder="0"> </iframe>
        </div>
    </div>

    <div class="container">
        <div style="display: none;">
            <a href="https://github.com/ompomz/flowgazer/">
                <h1>flowgazer</h1>
            </a>
            <p>新設計版！タイムラインを見たり、投稿したり、ふぁぼったりできるよ。作ったのはClaude。</p>
        </div>

        <div class="flex-center" style="display: flex; justify-content: left; gap: 0.5rem;">
            <button id="show-settings" style="white-space: nowrap; font-size: .8rem; font-weight: 700; padding: 4px 16px; margin: .5rem 0 0 0; border: none; border-radius: 999px; cursor: pointer; background-color: hsl(0, 0%, 60%); color: #fff;">詳細設定を表示</button>
            <button id="hide-settings" class="hidden" style="white-space: nowrap; font-size: .8rem; font-weight: 700; padding: 4px 16px; margin: .5rem 0 0 0; border: none; border-radius: 999px; cursor: pointer; background-color: hsl(0, 0%, 60%); color: #fff;">詳細設定を隠す</button>
        <div id="tab-buttons">
            <button id="tab-global" class="tab-button active">みんな</button>
            <button id="tab-following" class="tab-button">フォロー</button>
            <!-- チャンネルタブ：初期は非表示。チャンネル選択時に表示 -->
            <button id="tab-channel" class="tab-button" style="display:none;">チャンネル</button>
            <button id="tab-myposts" class="tab-button">自分</button>
            <button id="tab-likes" class="tab-button">ふぁぼられ</button>
        </div>
        </div>

        <div id="advanced-settings" class="hidden">

            <div class="flex-container">
                <button id="generate-trial-keypair" onclick="generateAndLoginWithNewKeypair()">新しい鍵ペアを生成して試す！</button>
                <button class="btn-grow" onclick="showAuthUI()">すでに鍵をお持ちの方</button>
            </div>

            <div class="flex-container"> <a id="npub-link" class="npub-link" target="_blank"></a>
                <span id="not-logged-in">見るだけモード</span>
            </div>

            <textarea id="new-post-content" rows="1" placeholder="いまなにしてる？" class="full-width"></textarea>
            <button id="send-new-post" class="full-width">投稿</button>

            <div class="flex-container">
                <input id="relay-url" type="text" list="relay-suggestions" placeholder="wss://...">
                <datalist id="relay-suggestions">
                    <option value="wss://r.kojira.io/">
                    <option value="wss://yabu.me/">
                    <option value="wss://nostr.compile-error.net/">
                    <option value="wss://relay-jp.nostr.wirednet.jp/">
                    <option value="wss://relay.damus.io/">
                    <option value="wss://nos.lol/">
                    <option value="wss://relay.nostr.band/">
                </datalist>
                <button id="subscribe-relay">接続</button>
            </div>

            <div class="flex-container flex-wrap">
                <select id="post-kind-selector">
                    <option value="1">投稿モード：通常</option>
                    <option value="42">投稿モード：チャンネル</option>
                </select>
                <select id="channel-list-selector" class="hidden">
                    <option value="">チャンネルを選択</option>
                </select>
            </div>

            <div class="settings-checkbox-row flex-wrap">
                <label for="auto-update-toggle" class="no-margin-left">自動更新</label>
                <input type="checkbox" id="auto-update-toggle" checked>

                <label for="filter-flowgazer-only">via flowgazer</label>
                <input type="checkbox" id="filter-flowgazer-only">

                <label for="toggle-kind42">チャンネル投稿</label>
                <input type="checkbox" id="toggle-kind42">

                <label for="kind-7-content-input">ふぁぼマーク</label>
                <input id="kind-7-content-input" type="text" maxlength="10" value="⭐">
            </div>

            <div class="flex-container">
                <textarea id="hex-filter" rows="2" placeholder="投稿者しぼりこみ(npub1…,hex…)"></textarea>
                <div class="flex-column">
                    <button id="apply-filter">適用</button>
                    <button id="clear-filter">クリア</button>
                </div>
            </div>
        </div>

        <ul id="timeline"></ul>
        <button id="load-more" class="full-width">もっと見る</button>

        <p class="viewongithub"><a href="https://github.com/ompomz/flowgazer">view on github</a></p>
    </div>

    <!-- 
    Based on motherfucking-nostr-client by かすてらふぃ（jiftechnify）
    Some parts generated or modified with AI assistance  
    Uses nostr-tools (MIT License)
    Licensed under WTFPL
    -->

    <!-- 既存JS -->
    <script src="https://ompomz.github.io/tweetsrecap/utility.js"></script>
    <script src="https://ompomz.github.io/flowgazer/auth.js"></script>
    <script src="./auth-ui.js"></script>
    <script src="https://unpkg.com/nostr-tools@2.17.0/lib/nostr.bundle.js"></script>

    <!-- 新設計JS -->
    <script src="https://ompomz.github.io/flowgazer/relay-manager.js"></script>
    <script src="./data-store.js"></script>
    <script src="./view-state.js"></script>
    <script src="https://ompomz.github.io/flowgazer/profile-fetcher.js"></script>
    <script src="https://ompomz.github.io/flowgazer/timeline.js"></script>
    <script src="./app.js"></script>

    <script>
        console.log('✅ スクリプト読み込み完了');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.dataStore || !window.viewState) {
                console.error('❌ 初期化エラー');
                return;
            }

            window.timeline = new Timeline(document.getElementById('timeline'));

            await window.app.init();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('ehagaki-modal');
            const openBtn = document.getElementById('open-ehagaki-modal');
            const closeBtn = document.getElementById('close-ehagaki-modal');

            // モーダルを開く
            openBtn.addEventListener('click', () => {
                modal.style.display = 'flex';
            });

            // モーダルを閉じる
            const closeModal = () => {
                modal.style.display = 'none';
            };
            closeBtn.addEventListener('click', closeModal);

            // モーダル外クリックで閉じる
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            // eHagakiからの投稿通知を受信
            window.addEventListener('message', (event) => {
                if (event.origin !== 'https://lokuyow.github.io') return;

                const data = event.data;
                if (data.type === 'POST_SUCCESS') {
                    console.log('eHagaki: 投稿成功！');
                    // 成功したら少し待ってモーダルを閉じる
                    setTimeout(() => {
                        closeModal();
                        // 必要であればタイムラインのリロード処理をここに書く
                        // window.app.refreshTimeline(); 
                    }, 1000);
                } else if (data.type === 'POST_ERROR') {
                    console.error('eHagaki: 投稿失敗', data.error);
                }
            });
        });
    </script>
</body>

</html>
