<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flowgazer</title>
    <link rel="icon" type="image/x-icon" href="https://ompomz.github.io/flowgazer/favicon.ico">

    <style>
        /* ベーススタイル */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-weight: 400;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
            padding: .5rem;
            line-height: 1.3;
            background-color: #f7f7f7;
            color: #666;
            font-size: .9rem;
        }

        .container {
            max-width: 600px;
            margin: 0 auto 0 .5rem;
            padding: .5rem;
        }

        a {
            color: #666;
            text-decoration: none;
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: .5rem;
        }

        /* フォーム要素の共通設定 */
        input,
        textarea,
        select {
            transition: background-color 0.3s, color 0.3s;
            cursor: pointer;
            font-size: .9rem;
            padding: .5rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            color: #666;
            background-color: #fff;
        }

        input[type="checkbox"] {
            vertical-align: middle;
            cursor: pointer;
        }

        textarea {
            resize: vertical;
        }

        /* ボタン共通 */
        .container button {
            white-space: nowrap;
            font-size: .8rem;
            font-weight: 700;
            padding: 4px 16px;
            margin: .5rem 0;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            background-color: #ddd;
            color: #fff;
        }

        .full-width {
            width: 100%;
        }

        /* レイアウト用共通クラス */
        .flex-container {
            display: flex;
            align-items: center;
            gap: .5rem;
            margin: .5rem 0;
        }

        .flex-column {
            display: flex;
            flex-direction: column;
            gap: 0.125rem;
        }

        .flex-wrap {
            flex-wrap: wrap;
        }

        .flex-container button,
        .flex-container input,
        .flex-container textarea {
            flex-grow: 1;
            margin: 0;
        }

        .flex-between-end {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 0.5rem;
        }

        /* チェックボックス行専用のスタイル */
        .settings-checkbox-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.25rem;
            margin: 0;
        }

        .settings-checkbox-row input {
            flex-grow: 0 !important;
            width: auto;
            margin: 0;
        }

        .settings-checkbox-row label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            white-space: nowrap;
            margin-left: 0.5rem;
            font-size: 0.85rem;
        }

        .settings-checkbox-row .no-margin-left {
            margin-left: 0.25rem !important;
        }

        /* 特定入力欄 */
        #kind-7-content-input {
            width: 2.2rem;
            height: 1.5rem;
            text-align: center;
            padding: 0;
        }

        /* ehagaki モーダル関連 (優先設定) */
        /* ボタン: open-ehagaki-modal */
        #open-ehagaki-modal {
            position: fixed;
            top: 0.5rem;
            right: 0.5rem;
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background-color: hsla(150, 70%, 70%, 0.3);
            background-image: url('https://raw.githubusercontent.com/Lokuyow/ehagaki/main/public/ehagaki_icon.svg');
            background-size: 60%;
            background-repeat: no-repeat;
            background-position: center;
            border: none;
            cursor: pointer;
            z-index: 999;
            transition: transform 0.2s;
        }

        #open-ehagaki-modal:hover {
            transform: scale(1.1);
        }

        /* モーダル外枠 */
        #ehagaki-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        /* モーダルコンテンツ */
        #ehagaki-modal>div {
            position: relative;
            width: 95%;
            max-width: 600px;
            height: 80vh;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        /* 閉じるボタン */
        #close-ehagaki-modal {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            font-weight: bold;
            color: #fff;
            background: hsl(152, 74%, 43%, 0.5);
            border: none;
            border-radius: 999px;
            padding: 6px 18px;
            cursor: pointer;
        }

        /* iframe */
        #ehagaki-iframe {
            width: 100%;
            height: 100%;
        }

        /* タイムライン・表示制御 */
        ul {
            list-style: none;
            padding: 0;
            margin: .5rem 0;
        }

        li.event {
            word-break: break-all;
            padding: .5rem .25rem;
            border-top: 1px dashed #ddd;
        }

        .event-liked {
            border-right: .3rem solid gold;
        }

        .npub-link,
        .nostr-ref,
        .pubkey-ref {
            color: #66b3ff;
            text-decoration: none;
        }

        .custom-emoji {
            height: 1.2rem;
            vertical-align: bottom;
        }

        .post-content {
            display: inline;
        }

        .hidden-section,
        .hidden {
            display: none;
        }

        /* タブまわりなど */
        .setting-tabs-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: flex-start;
            margin: 0;
        }

        #show-settings,
        #hide-settings {
            background-color: hsl(0, 0%, 60%);
            margin-right: 0.25rem;
        }

        #tab-buttons {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        .tab-button.active {
            background: #66b3ff;
        }

        #load-more {
            background: #66b3ff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* 各種カラーバリエーション */
        #generate-trial-keypair {
            background-color: #f9c;
        }

        #send-new-post,
        #subscribe-relay,
        #apply-filter,
        #clear-filter {
            background-color: #ffcc66;
            text-align: center;
            padding: 4px 0;
            max-width: 4rem;
            width: 4rem;
        }

        /* アニメーション */
        #load-more.loading::before {
            content: "";
            width: 0.9rem;
            height: 0.9rem;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='3' stroke-linecap='round'><path d='M12 2a10 10 0 1 1-10 10' /></svg>");
            background-size: contain;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* フッター・レスポンシブ */
        .viewongithub {
            text-align: center;
            padding-bottom: 3rem;
        }

        .viewongithub a {
            color: #66b3ff !important;
        }

        @media (max-width: 767px) {
            .container {
                max-width: 100%;
                padding: 4px;
                margin: 0;
            }
        }

        @media (max-width: 400px) {
            .flex-container button {
                font-size: 0.6rem !important;
            }
        }
    </style>
</head>

<body>
    <button id="open-ehagaki-modal"></button>

    <div id="ehagaki-modal">
        <div>
            <button id="close-ehagaki-modal">✕ とじる</button>
            <iframe id="ehagaki-iframe" src="https://lokuyow.github.io/ehagaki/" frameborder="0"></iframe>
        </div>
    </div>

    <div class="container">
        <div class="hidden-section">
            <a href="https://github.com/ompomz/flowgazer/">
                <h1>flowgazer</h1>
            </a>
            <p>新設計版！タイムラインを見たり、投稿したり、ふぁぼったりできるよ。作ったのはClaude。</p>
        </div>

        <div class="setting-tabs-row">
            <button id="show-settings">詳細設定を表示</button>
            <button id="hide-settings" class="hidden">詳細設定を隠す</button>

            <div id="advanced-settings" style="margin:-0.25rem 0;" class="hidden">

                <div class="flex-container"> <a id="npub-link" class="npub-link" target="_blank"></a>
                    <span id="not-logged-in">見るだけモード</span>
                </div>

                <div class="flex-container">
                    <button class="btn-grow" onclick="showAuthUI()">すでに鍵をお持ちの方</button>
                    <button id="generate-trial-keypair"
                        onclick="generateAndLoginWithNewKeypair()">新しい鍵ペアを生成して試す！</button>
                </div>

                <div class="flex-container">
                    <input id="relay-url" type="text" list="relay-suggestions" placeholder="wss://...">
                    <datalist id="relay-suggestions">
                        <option value="wss://r.kojira.io/">
                        <option value="wss://yabu.me/">
                        <option value="wss://nostr.compile-error.net/">
                        <option value="wss://relay-jp.nostr.wirednet.jp/">
                        <option value="wss://relay.damus.io/">
                        <option value="wss://nos.lol/">
                        <option value="wss://relay.nostr.band/">
                    </datalist>
                    <button id="subscribe-relay">接続</button>
                </div>

                <div class="settings-checkbox-row">
                    <label for="auto-update-toggle" class="no-margin-left">自動更新</label>
                    <input type="checkbox" id="auto-update-toggle" checked>

                    <label for="filter-flowgazer-only">flowgazerしぼりこみ</label>
                    <input type="checkbox" id="filter-flowgazer-only">

                    <label for="toggle-kind42">チャンネル投稿</label>
                    <input type="checkbox" id="toggle-kind42">

                    <label for="kind-7-content-input">ふぁぼマーク</label>
                    <input id="kind-7-content-input" type="text" maxlength="10" value="⭐">
                </div>

                <div class="flex-container">
                    <div class="flex-column" style="flex-grow: 1;">
                        <label for="hex-filter" style="margin-left: 0.25rem;">投稿者しぼりこみ</label>
                        <textarea id="hex-filter" rows="2" placeholder="npub1…,hex…"></textarea>
                    </div>
                    <div class="flex-column" style="flex-grow: 0;">
                        <button id="apply-filter">適用</button>
                        <button id="clear-filter">クリア</button>
                    </div>
                </div>

                <div class="flex-container flex-wrap">
                    <select id="post-kind-selector">
                        <option value="1">投稿モード：通常</option>
                        <option value="42">投稿モード：チャンネル</option>
                    </select>
                    <select id="channel-list-selector" class="hidden">
                        <option value="">チャンネルを選択</option>
                    </select>
                </div>

                <div class="flex-container">
                    <textarea id="new-post-content" rows="1" placeholder="いまなにしてる？" class="full-width"></textarea>
                    <button id="send-new-post" class="full-width">投稿</button>
                </div>

            </div>

            <div id="tab-buttons">
                <button id="tab-global" class="tab-button active">みんな</button>
                <button id="tab-following" class="tab-button">フォロー</button>
                <button id="tab-channel" class="tab-button hidden">チャンネル</button>
                <button id="tab-myposts" class="tab-button">自分</button>
                <button id="tab-likes" class="tab-button">ふぁぼられ</button>
            </div>
        </div>

        <ul id="timeline"></ul>
        <button id="load-more" class="full-width">もっと見る</button>

        <p class="viewongithub"><a href="https://github.com/ompomz/flowgazer">view on github</a></p>
    </div>

    <!-- 
    Based on motherfucking-nostr-client by かすてらふぃ（jiftechnify）
    Some parts generated or modified with AI assistance  
    Uses nostr-tools (MIT License)
    Licensed under WTFPL

    <!-- 既存JS -->
    <script src="https://ompomz.github.io/tweetsrecap/utility.js"></script>
    <script src="https://ompomz.github.io/flowgazer/auth.js"></script>
    <script src="./auth-ui.js"></script>
    <script src="https://unpkg.com/nostr-tools@2.17.0/lib/nostr.bundle.js"></script>

    <!-- 新設計JS -->
    <script src="https://ompomz.github.io/flowgazer/relay-manager.js"></script>
    <script src="./data-store.js"></script>
    <script src="./view-state.js"></script>
    <script src="https://ompomz.github.io/flowgazer/profile-fetcher.js"></script>
    <script src="https://ompomz.github.io/flowgazer/timeline.js"></script>
    <script src="./app.js"></script>

    <script>
        console.log('✅ スクリプト読み込み完了');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.dataStore || !window.viewState) {
                console.error('❌ 初期化エラー');
                return;
            }

            window.timeline = new Timeline(document.getElementById('timeline'));

            await window.app.init();
        });

        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('ehagaki-modal');
            const openBtn = document.getElementById('open-ehagaki-modal');
            const closeBtn = document.getElementById('close-ehagaki-modal');

            // モーダルを開く
            openBtn.addEventListener('click', () => {
                modal.style.display = 'flex';
            });

            // モーダルを閉じる
            const closeModal = () => {
                modal.style.display = 'none';
            };
            closeBtn.addEventListener('click', closeModal);

            // モーダル外クリックで閉じる
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            // eHagakiからの投稿通知を受信
            window.addEventListener('message', (event) => {
                if (event.origin !== 'https://lokuyow.github.io') return;

                const data = event.data;
                if (data.type === 'POST_SUCCESS') {
                    console.log('eHagaki: 投稿成功！');
                    // 成功したら少し待ってモーダルを閉じる
                    setTimeout(() => {
                        closeModal();
                        // 必要であればタイムラインのリロード処理をここに書く
                        // window.app.refreshTimeline(); 
                    }, 1000);
                } else if (data.type === 'POST_ERROR') {
                    console.error('eHagaki: 投稿失敗', data.error);
                }
            });
        });
    </script>
</body>

</html>
