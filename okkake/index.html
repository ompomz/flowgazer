<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>okkake</title>
  <style>
    :root {
      --bg: #f7f7f7;
      --txt: #666;
      --panel: #fafafa;
      --accent: #ffcc66;
      --link: #66b3ff;
      --border: #ddd;
    }

    /* ダークモード（bodyに.dark-modeクラスがついた時またはOS設定がダークの時） */
    body.dark-mode {
      --bg: #132639;
      --txt: #ccc;
      --panel: #1b263b;
      --accent: #f0ad4e;
      --link: #4da3ff;
      --border: #444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-weight: 400;
      padding: 0.5rem;
      line-height: 1.3;
      background-color: var(--bg);
      color: var(--txt);
      font-size: 0.9rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
    }

    .container {
      max-width: 600px;
      margin: 0.5rem;
    }

    input,
    select,
    textarea {
      font-size: 0.9rem;
      padding: 0.3rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--txt);
      background-color: var(--panel);
      margin: 2px;
    }

    button {
      white-space: nowrap;
      font-size: 0.9rem;
      /* 0.8remから変更 */
      font-weight: 700;
      padding: 4px 12px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background-color: var(--accent);
      color: #fff;
      margin: 0.25rem 0rem 0.25rem 0rem;
    }

    .event {
      word-break: break-all;
      padding: 0.4rem 0.25rem;
      border-top: 1px dashed var(--border);
    }

    .event.is-favored {
      border-right: 5px solid #ffeb3b;
    }

    .time,
    .author,
    .nostr-ref,
    .pubkey-ref {
      color: var(--link);
      text-decoration: none;
      font-weight: normal;
    }

    .post-content {
      display: inline;
      color: var(--txt);
    }


    /* 親要素をFlexモードにする */
    .magicalcontainer {
      display: flex;
      flex-direction: column;
    }


    /* --- 通常時（昇順：古い順） --- */
    #older {
      order: 1;
    }

    /* 過去ボタンが上 */
    #timeline {
      order: 2;
    }

    /* タイムラインが真ん中 */
    #newer {
      order: 3;
    }

    /* 未来ボタンが下 */
    #older::before {
      content: "▲ ";
    }

    /* 過去は上向き */
    #newer::before {
      content: "▼ ";
    }

    /* 未来は下向き */

    /* --- 降順（新しい順）のとき --- */
    .magicalcontainer.is-desc #newer {
      order: 1;
    }

    /* 未来ボタンが一番上へワープ！ */
    .magicalcontainer.is-desc #timeline {
      order: 2;
    }

    .magicalcontainer.is-desc #older {
      order: 3;
    }

    /* 過去ボタンが一番下へワープ！ */


    .magicalcontainer.is-desc #newer::before {
      content: "▲ ";
    }

    .magicalcontainer.is-desc #older::before {
      content: "▼ ";
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      /* ← 52px → 50px にすると比率が整う */
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--border);
      border-radius: 26px;
      transition: 0.3s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      /* ← 余白はそのままでOK */
      bottom: 3px;
      background: var(--panel);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      /* 13pxから変更 */
      transition: 0.3s;
    }

    /* ON */
    input:checked+.slider {
      background: var(--link);
    }

    input:checked+.slider:before {
      transform: translateX(24px);
      content: "";
    }

    /* ------------------- */

    /* コンテナを右下に固定 */
    .floating-btn-container {
      position: fixed;
      bottom: 4rem;
      right: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 100;
      opacity: 0.1;
      pointer-events: auto;
      transition: opacity 0.3s;
    }

    .floating-btn-container.is-visible {
      opacity: 0.6;
      pointer-events: auto;
    }

    /* ボタン共通 */
    .floating-btn {
      height: 2.5rem;
      width: 2.5rem;
      background-color: var(--link);
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1.5rem;
      /* ここはアイコン用の特殊サイズのため維持 */
      font-weight: normal;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 0;
      transition: opacity 0.3s;
    }

    .floating-btn:hover {
      opacity: 1;
    }

    /* --- モーダル全体の共通設定（utility側のクラス名と被らないように調整） --- */

    /* 1. 設定モーダル本体 (IDで詳細度を高くする) */
    #settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      /* 最初は非表示 */
      justify-content: center;
      align-items: center;
      z-index: 200;
      /* ボタンより前に出す */
    }

    /* 2. 設定モーダルの中身 */
    #settings-modal .settings-body {
      background: var(--panel);
      color: var(--txt);
      padding: 1.5rem;
      border-radius: 0.5rem;
      width: 90%;
      max-width: 400px;
    }

    /* 3. 閉じるボタン */
    #settings-modal .close-btn {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      background-color: var(--accent);
      color: #fff;
    }

    /* 画面幅が600px以下のとき（スマホ向け設定） */
    @media (max-width: 600px) {
      body {
        padding: 0.5rem;
      }

      .container {
        margin: 0;
        max-width: 100%;
      }

      .event {
        padding: 0.6rem 0.4rem;
        font-size: 0.9rem;
      }

      input,
      select,
      textarea {
        width: 100%;
        font-size: 0.9rem;
        margin: 4px 0;
      }
    }

    .is-hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="flex-container">
      <input type="text" id="eventId" placeholder="nevent...">
      <input type="text" id="relay" list="relay-suggestions" placeholder="wss://...">
      <datalist id="relay-suggestions">
        <option value="wss://r.kojira.io/">
        <option value="wss://yabu.me/">
        <option value="wss://nostr.compile-error.net/">
        <option value="wss://relay-jp.nostr.wirednet.jp/">
        <option value="wss://relay.damus.io/">
        <option value="wss://nos.lol/">
        <option value="wss://relay.nostr.band/">
      </datalist>
      <input type="text" id="pubkey" placeholder="npub...">
      <button id="load">取得</button>
    </div>

    <div class="magicalcontainer">
      <button id="older">もっと見る</button>
      <ul id="timeline" style="list-style: none;"></ul>
      <button id="newer">もっと見る</button>
    </div>

  </div>
  <div class="floating-btn-container">
    <button id="go-to-origin" class="floating-btn">⏮</button>
    <button id="open-settings" class="floating-btn settings-btn">⚙️</button>
  </div>

  <div id="settings-modal">
    <div class="settings-body">
      <h4>settings</h4>
      <span>表示順</span>
      <select id="sort-order">
        <option value="asc">↑過去/現在↓</option>
        <option value="desc">↑現在/過去↓</option>
      </select>

      <span>ふぁぼマーク</span>
      <input id="kind-7-content-input" type="text" maxlength="10" value="⭐"
        style="width: 2.5rem; height: 1.5rem; text-align: center; font-size: 0.9rem; vertical-align: middle; border: 1px solid #ccc; border-radius: 4px; display: inline-block;">

      <span>ダークモード</span>
      <div class="switch-container">
        <label class="switch">
          <input type="checkbox" id="theme-toggle">
          <span class="slider"></span>
        </label>
      </div>
      <button id="close-settings" class="close-btn">とじる</button>
    </div>
  </div>


  <script>
    const sortSelect = document.getElementById("sort-order");
    const container = document.querySelector(".magicalcontainer");


    sortSelect.onchange = function () {
      timeline.sortOrder = this.value;

      if (this.value === 'desc') {
        container.classList.add("is-desc");
      } else {
        container.classList.remove("is-desc");
      }

      timeline.render();
    };


    const themeToggle = document.getElementById('theme-toggle');


    themeToggle.onchange = function () {
      if (this.checked) {
        // スイッチがON = ダークモードにする
        document.body.classList.remove('light-mode');
        document.body.classList.add('dark-mode');
        console.log("🌙 Dark mode activated");
      } else {
        // スイッチがOFF = ライトモードにする
        document.body.classList.remove('dark-mode');
        document.body.classList.add('light-mode');
        console.log("☀️ Light mode activated");
      }
    };

    // 設定ボタン
    document.getElementById("open-settings").onclick = function () {
      document.getElementById("settings-modal").style.display = "flex";
    };

    // 閉じるボタン
    document.getElementById("close-settings").onclick = function () {
      document.getElementById("settings-modal").style.display = "none";
    };

    // 背景クリックで閉じる
    document.getElementById("settings-modal").onclick = function (e) {
      if (e.target === this) {
        this.style.display = "none";
      }
    };

  </script>
  <script src="https://unpkg.com/nostr-tools@2.17.0/lib/nostr.bundle.js"></script>
  <script src="https://ompomz.github.io/flowgazer/relay-manager.js"></script>
  <script src="./okkake.js"></script>
  <script src="./sendfav.js"></script>
  <script src="https://ompomz.github.io/tweetsrecap/utility.js"></script>
</body>

</html>
