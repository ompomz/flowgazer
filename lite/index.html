<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flowgazer lite</title>
  <style>
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    :root {
      --primary: #0078D4;
      --primary-hover: #106EBE;
      --bg: #F3F2F1;
      --surface: #FFFFFF;
      --border: #E1DFDD;
      --text: #999;
      --text-soft: #aaa;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-weight: 400;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
      padding: .5rem;
      line-height: 1.3;
      background-color: var(--bg);
      color: var(--text);
      font-size: .9rem;
    }

    .container {
      max-width: 600px;
      margin-left: .5rem;
      margin-right: auto;
      padding: .5rem;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    input,
    textarea {
      transition: border-color 0.3s, background-color 0.3s;
      cursor: pointer;
      font-size: .9rem;
      padding: .5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      background-color: var(--surface);
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    input[type="checkbox"] {
      padding: 0;
      margin: 0;
      vertical-align: middle;
      appearance: checkbox;
      -webkit-appearance: checkbox;
    }

    textarea {
      resize: none;
      overflow: hidden;
      font-weight: 400;
      font-family: inherit;
    }

    .container button {
      white-space: nowrap;
      font-size: .8rem;
      font-weight: 600;
      padding: 4px 16px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background-color: var(--border);
      color: var(--text);
    }

    /* --- Layout Containers --- */
    .flex-container {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin: .5rem 0;
    }

    .between-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: .5rem 0;
    }

    .flex-container input,
    .flex-container textarea,
    .between-container input {
      flex-grow: 1;
      margin: 0;
    }

    /* --- Specific Elements --- */
    #relay-url {
      height: 2.25rem;
    }

    #new-post-content {
      height: 2.25rem;
      margin-left: -0.5rem;
    }

    #npub-link {
      display: none;
    }

    /* --- Advanced Settings --- */
    #advanced-settings>div:first-child {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: 0.25rem;
      flex-wrap: wrap;
    }

    #advanced-settings label {
      margin-left: 1rem;
    }

    #advanced-settings label[for="auto-update-toggle"] {
      margin-left: 0;
    }

    #filter-flowgazer-only,
    label[for="filter-flowgazer-only"] {
      display: none;
    }

    #kind-7-content-input {
      width: 2.5rem;
      height: 1.5rem;
      text-align: center;
      font-size: 0.9rem;
      vertical-align: middle;
      border: 1px solid #ccc;
      border-radius: 4px;
      display: inline-block;
      padding: 0;
    }

    /* フィルタボタン縦並び用コンテナ */
    .flex-container>div:has(#apply-filter) {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    /* --- Post & Footer Area --- */
    form[onsubmit*="false"] {
      display: inline;
    }

    #temp-nsec-input {
      display: none;
      max-width: 3.5rem;
      margin-right: 0.5rem;
    }

    .viewongithub {
      text-align: center;
      padding-bottom: 4rem;
    }

    /* --- Components --- */
    .full-width {
      width: 100%;
    }

    #tab-buttons {
      display: flex;
      margin: 0 0 -6px 0;
      justify-content: center;
    }

    #tab-buttons .tab-button {
      flex: 1;
      border: none;
      background: var(--border);
      border-radius: 0;
      color: var(--text-soft);
    }

    #tab-buttons .tab-button.active {
      background: var(--primary);
      color: #fff;
    }

    #load-more {
      background: var(--primary);
      color: #fff;
      margin: 0.5rem 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #subscribe-relay,
    #show-settings,
    #hide-settings,
    #send-new-post {
      text-align: center;
      padding: 4px 0;
      width: 6rem;
    }

    /* --- Utility --- */
    .hidden {
      display: none;
    }

    /* --- Timeline Event Styles --- */
    ul {
      list-style: none;
      margin-top: 0.5rem;
      min-height: 1px;
    }

    li.event {
      word-break: break-all;
      padding: .5rem .25rem;
      border-top: 1px solid var(--border);
    }

    .post-content {
      display: inline
    }

    .event-liked {
      border-right: .3rem solid var(--primary);
    }

    .npub-link,
    .nostr-ref,
    .pubkey-ref {
      color: var(--primary);
    }

    .custom-emoji {
      height: 1.2rem;
      vertical-align: bottom;
    }

    @media (max-width:767px) {
      .container {
        max-width: 100%;
        padding: 4px;
        margin: 0;
      }
    }

    .post-options {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin: 0.5rem 0;
    }

    .post-options select {
      height: 2.25rem;
      padding: 0 0.5rem;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="flex-container">
      <button onclick="showAuthUI()">🔑</button>
      <input id="relay-url" type="text" list="relay-suggestions">
      <datalist id="relay-suggestions">
        <option value="wss://r.kojira.io/">
        <option value="wss://yabu.me/">
        <option value="wss://nostr.compile-error.net/">
        <option value="wss://relay-jp.nostr.wirednet.jp/">
        <option value="wss://relay.damus.io/">
        <option value="wss://nos.lol/">
        <option value="wss://relay.nostr.band/">
      </datalist>
      <button id="subscribe-relay">connect</button>
    </div>
    <div class="between-container">
      <a id="npub-link" class="npub-link" target="_blank"></a><span id="not-logged-in">ROM</span>
      <button id="show-settings">option</button>
      <button id="hide-settings" class="hidden">option</button>
    </div>

    <button id="generate-trial-keypair" class="hidden" onclick="generateAndLoginWithNewKeypair()">
      新しい鍵ペアを生成して試す！
    </button>

    <div id="advanced-settings" class="hidden">

      <div>
        <label for="auto-update-toggle">autoload</label>
        <input type="checkbox" id="auto-update-toggle" checked>

        <label for="filter-flowgazer-only">via flowgazer しぼりこみ</label>
        <input type="checkbox" id="filter-flowgazer-only">

        <label for="toggle-kind42">view kind:42</label>
        <input type="checkbox" id="toggle-kind42">

        <label for="kind-7-content-input">kind:7 content</label>
        <input id="kind-7-content-input" type="text" maxlength="10" value="⭐">
      </div>

      <div class="flex-container">
        <textarea id="hex-filter" rows="2" placeholder="(npub1…,hex…)"></textarea>
        <div>
          <button id="apply-filter">apply</button>
          <button id="clear-filter">clear</button>
          <button id="load-follows" class="hidden">kind:3</button>
        </div>
      </div>

      <div class="post-options">
        <select id="post-kind-selector">
          <option value="1">kind:1</option>
          <option value="42">kind:42</option>
        </select>
        <select id="channel-list-selector" class="hidden">
          <option value="">select</option>
        </select>
      </div>

    </div>

    <div class="flex-container">
      <input type="text" name="username" autocomplete="username" class="hidden">
      <form onsubmit="return false;">
        <input type="password" id="temp-nsec-input" autocomplete="nsec" placeholder="nsec">
      </form>
      <textarea id="new-post-content" placeholder=""></textarea>
      <button id="send-new-post">send</button>
    </div>

    <div id="tab-buttons">
      <button id="tab-global" class="tab-button">global</button>
      <button id="tab-following" class="tab-button active">kind:3</button>
      <button id="tab-myposts" class="tab-button">me</button>
      <button id="tab-likes" class="tab-button">befaved</button>
    </div>

    <ul id="timeline"></ul>

    <button id="load-more" class="full-width">loadmore</button>

    <p class="viewongithub"><a href="https://github.com/ompomz/flowgazer">view on github</a></p>

  </div>

  <!-- 既存JS -->
  <script src="https://ompomz.github.io/tweetsrecap/utility.js"></script>
  <script src="https://ompomz.github.io/flowgazer/auth.js"></script>
  <script src="https://ompomz.github.io/flowgazer/auth-ui.js"></script>

  <!-- 
  Based on motherfucking-nostr-client by かすてらふぃ（jiftechnify）
  Some parts generated or modified with AI assistance  
  Uses nostr-tools (MIT License)
  Licensed under WTFPL
  -->

  <script src="https://unpkg.com/nostr-tools@2.17.0/lib/nostr.bundle.js"></script>

  <!-- 新設計JS -->
  <script src="https://ompomz.github.io/flowgazer/relay-manager.js"></script>
  <script src="https://ompomz.github.io/flowgazer/data-store.js"></script>
  <script src="https://ompomz.github.io/flowgazer/view-state.js"></script>
  <script src="https://ompomz.github.io/flowgazer/profile-fetcher.js"></script>
  <script src="./timeline.js"></script>
  <script src="./app.js"></script>

  <script>
    // 初期化確認（詳細版を維持）
    console.log('✅ スクリプト読み込み完了');
    console.log('Components:', {
      dataStore: typeof window.dataStore,
      viewState: typeof window.viewState,
      app: typeof window.app
    });

    document.addEventListener('DOMContentLoaded', async () => {
      // インスタンスの存在確認
      if (!window.dataStore || !window.viewState) {
        console.error('❌ 初期化エラー');
        alert('初期化エラー: ページを再読み込みしてください');
        return;
      }

      // タイムラインインスタンス作成
      window.timeline = new Timeline(document.getElementById('timeline'));

      // アプリ初期化
      await window.app.init();

      // --- 安全なイベントリスナー登録用のヘルパー関数 ---
      const addEvent = (id, event, handler) => {
        const el = document.getElementById(id);
        if (el) el.addEventListener(event, handler);
      };

      // 投稿実行（tempNsec対応版）
      addEvent('send-new-post', 'click', () => {
        const content = document.getElementById('new-post-content').value;
        const kindEl = document.getElementById('post-kind-selector');
        const channelEl = document.getElementById('channel-list-selector');
        const tempNsec = document.getElementById('temp-nsec-input')?.value; // 固有機能

        const kind = kindEl ? parseInt(kindEl.value) : 1;
        const channelId = channelEl ? channelEl.value : '';

        if (content) {
          if (kind === 42 && !channelId) {
            alert("送信先のチャンネルを選んでください！");
            return;
          }
          // 第4引数にtempNsecを渡す
          window.app.sendPost(content, kind, channelId, tempNsec);
        }
      });

      // Kind切り替え
      addEvent('post-kind-selector', 'change', (e) => {
        const channelSelector = document.getElementById('channel-list-selector');
        if (!channelSelector) return;

        if (e.target.value === "42") {
          channelSelector.style.display = "inline";
          if (typeof fetchMyChannels === 'function') fetchMyChannels();
        } else {
          channelSelector.style.display = "none";
        }
      });

      // Ctrl+Enter で送信
      addEvent('new-post-content', 'keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          document.getElementById('send-new-post')?.click();
        }
      });

      // リレー接続 / リフレッシュ
      addEvent('subscribe-relay', 'click', async () => {
        const urlInput = document.getElementById('relay-url');
        const url = urlInput ? urlInput.value.trim() : '';

        if (url) {
          window.app.connectRelay(url);
        } else {
          console.log('🔄 タイムラインをリフレッシュします');
          const btn = document.getElementById('subscribe-relay');
          if (btn) { btn.disabled = true; btn.textContent = '...'; }
          await window.app.initializeTimelineBaseline();
          if (btn) { btn.disabled = false; btn.textContent = '接続'; }
        }
      });

      // タブ切り替え
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const tab = e.target.id.replace('tab-', '');
          window.app.switchTab(tab);
        });
      });

      // フィルター適用
      addEvent('apply-filter', 'click', () => {
        const inputEl = document.getElementById('hex-filter');
        if (!inputEl) return;
        const input = inputEl.value;
        const authors = input.split(/[ ,\n]/)
          .map(s => s.trim())
          .filter(s => s.length === 64 || s.startsWith('npub'))
          .map(s => {
            if (s.startsWith('npub')) {
              try { return NostrTools.nip19.decode(s).data; } catch (e) { return null; }
            }
            return s;
          })
          .filter(Boolean);

        window.app.applyFilter(authors);
        localStorage.setItem('hexFilterValue', input);
      });

      // フィルタークリア
      addEvent('clear-filter', 'click', () => {
        const inputEl = document.getElementById('hex-filter');
        if (inputEl) inputEl.value = '';
        window.app.applyFilter(null);
        localStorage.removeItem('hexFilterValue');
      });

      // フォロー読み込み
      addEvent('load-follows', 'click', () => {
        if (!window.nostrAuth.isLoggedIn()) {
          alert('鍵の入力が必要です');
          if (typeof showAuthUI === 'function') showAuthUI();
          return;
        }
        const pubkeys = Array.from(window.dataStore.followingPubkeys);
        if (pubkeys.length === 0) {
          alert('フォローリストが取得できていません');
          return;
        }
        const inputEl = document.getElementById('hex-filter');
        if (inputEl) inputEl.value = pubkeys.join('\n');
        alert(`${pubkeys.length}人のフォローを読み込みました`);
      });

      // しぼりこみ/自動更新系
      addEvent('filter-flowgazer-only', 'change', (e) => window.app.toggleFlowgazerFilter(e.target.checked));

      // Kind42表示切り替え
      const kind42Checkbox = document.getElementById('toggle-kind42');
      if (kind42Checkbox) {
        const savedKind42 = localStorage.getItem('showKind42') === 'true';
        kind42Checkbox.checked = savedKind42;
        kind42Checkbox.addEventListener('change', (e) => window.app.toggleKind42Display(e.target.checked));
      }

      addEvent('auto-update-toggle', 'change', (e) => {
        window.app.isAutoUpdate = e.target.checked;
        if (e.target.checked) window.viewState.renderNow();
      });

      // もっと見る
      addEvent('load-more', 'click', function () {
        this.classList.add('loading');
        window.app.loadMore();
      });

      // 詳細設定トグル
      addEvent('show-settings', 'click', () => {
        document.getElementById('advanced-settings')?.classList.remove('hidden');
        document.getElementById('show-settings')?.classList.add('hidden');
        document.getElementById('hide-settings')?.classList.remove('hidden');
      });

      addEvent('hide-settings', 'click', () => {
        document.getElementById('advanced-settings')?.classList.add('hidden');
        document.getElementById('hide-settings')?.classList.add('hidden');
        document.getElementById('show-settings')?.classList.remove('hidden');
      });

      // ふぁぼ初期化
      const favInput = document.getElementById('kind-7-content-input');
      if (favInput) {
        favInput.addEventListener('change', (e) => saveFavMark(e.target.value));
        loadFavMark();
      }

      // フィルター復元
      const savedFilter = localStorage.getItem('hexFilterValue');
      if (savedFilter && document.getElementById('hex-filter')) {
        document.getElementById('hex-filter').value = savedFilter;
      }
    });

    // --- グローバル関数群 ---

    function generateAndLoginWithNewKeypair() {
      if (!confirm('新しい鍵ペアを生成します。nsecを失くさないよう保存してください。')) return;
      const seckey = window.NostrTools.generateSecretKey();
      const nsec = window.NostrTools.nip19.nsecEncode(seckey);
      window.nostrAuth.loginWithNsec(nsec);
      // 古い方の挙動（location.reload）にするか、新しい方の挙動（UI書き換え）にするか選べますが、
      // 確実なのは location.reload() です。
      location.reload();
    }

    function saveFavMark(val) {
      const chars = Array.from(val);
      const singleChar = chars.length > 0 ? chars[0] : "+";
      localStorage.setItem('favMark', singleChar);
      const input = document.getElementById('kind-7-content-input');
      if (input) input.value = singleChar;
    }

    function loadFavMark() {
      const savedMark = localStorage.getItem('favMark');
      const input = document.getElementById('kind-7-content-input');
      if (savedMark && input) input.value = savedMark;
    }

    // 離脱復帰時の自動更新
    let lastActiveTime = Date.now();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        const idleTime = (Date.now() - lastActiveTime) / 1000;
        if (idleTime > 30 && window.app?.initializeTimelineBaseline) {
          window.app.initializeTimelineBaseline();
        }
      } else {
        lastActiveTime = Date.now();
      }
    });
  </script>
</body>

</html>
